name: CI

on:
  push:
    paths:
      - '**.kt'
      - '**.kts'
      - '**.tidy'
      - '.github/workflows/build.yml'

jobs:
  build:

    runs-on: macos-latest
    timeout-minutes: 65

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Build with Gradle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/ci-logs
          gradle_log="build/ci-logs/gradle-jsTest.log"
          watchdog_log="build/ci-logs/watchdog.log"
          process_log="build/ci-logs/process-memory.log"
          export CHROME_LOG_FILE="${PWD}/build/ci-logs/chrome.log"

          ./gradlew --no-daemon jsTest --stacktrace 2>&1 | tee "${gradle_log}" &
          gradle_pid=$!

          sample_resources() {
            {
              echo "===== $(date -u '+%Y-%m-%dT%H:%M:%SZ') ====="
              echo "----- matching java/node/chrome/karma processes -----"
              ps -axo pid,ppid,etime,stat,%cpu,%mem,rss,vsz,comm,args \
                | awk 'NR == 1 || /java|gradle|kotlin|node|karma|[Cc]hrome/' \
                || true
              echo "----- top processes by RSS -----"
              {
                ps -axo pid,ppid,etime,stat,%cpu,%mem,rss,vsz,comm,args | sed -n '1p'
                ps -axo pid,ppid,etime,stat,%cpu,%mem,rss,vsz,comm,args | sed '1d' | sort -k7 -nr | awk 'NR <= 30'
              } || true
              echo "----- vm_stat -----"
              vm_stat || true
              echo "----- memory_pressure -----"
              memory_pressure || true
              echo
            } >> "${process_log}" 2>&1
          }

          dump_processes() {
            echo "----- active java/node/chrome processes -----"
            ps -axo pid,ppid,etime,stat,comm,args | grep -Ei 'java|gradle|kotlin|node|karma|chrome' | grep -v grep || true
            echo "----- latest process/memory samples -----"
            tail -n 250 "${process_log}" || true
            echo "----- jvm process list -----"
            jps -lv || true
            echo "----- gradle log tail -----"
            tail -n 300 "${gradle_log}" || true
          }

          terminate_build() {
            pkill -TERM -f 'GradleWrapperMain|org.gradle.launcher|KotlinCompileDaemon|karma|Chrome' || true
            sleep 15
            pkill -KILL -f 'GradleWrapperMain|org.gradle.launcher|KotlinCompileDaemon|karma|Chrome' || true
          }

          (
            while kill -0 "${gradle_pid}" 2>/dev/null; do
              sample_resources || true
              sleep 15
            done
            sample_resources || true
          ) &
          process_sampler_pid=$!

          (
            while kill -0 "${gradle_pid}" 2>/dev/null; do
              if grep -q 'reconnect failed before timeout' "${gradle_log}" 2>/dev/null; then
                sleep 60
                if kill -0 "${gradle_pid}" 2>/dev/null; then
                  {
                    echo "::error::Karma browser disconnected and Gradle did not exit within 60 seconds; collecting diagnostics before terminating it."
                    date
                    dump_processes
                  } | tee -a "${watchdog_log}"
                  terminate_build
                fi
                exit 0
              fi
              sleep 5
            done
          ) &
          disconnect_watchdog_pid=$!

          (
            sleep 50m
            {
              echo "::error::./gradlew jsTest exceeded 50 minutes; collecting process snapshot before terminating it."
              date
              dump_processes
            } | tee "${watchdog_log}"

            terminate_build
          ) &
          watchdog_pid=$!

          status=0
          wait "${gradle_pid}" || status=$?
          kill "${process_sampler_pid}" 2>/dev/null || true
          wait "${process_sampler_pid}" 2>/dev/null || true
          kill "${disconnect_watchdog_pid}" 2>/dev/null || true
          wait "${disconnect_watchdog_pid}" 2>/dev/null || true
          kill "${watchdog_pid}" 2>/dev/null || true
          wait "${watchdog_pid}" 2>/dev/null || true
          exit "${status}"
#          ./gradlew generateDylib && ./gradlew test buildPlugin --stacktrace
      - name: Dump JS test diagnostics
        if: failure()
        shell: bash
        run: |
          set +e

          echo "::group::Generated test result files"
          find tidyparse-core tidyparse-web -path '*/build/test-results/*' -type f | sort
          echo "::endgroup::"

          echo "::group::Generated test report entrypoints"
          find tidyparse-core tidyparse-web -path '*/build/reports/tests/*/index.html' -type f | sort
          echo "::endgroup::"

          echo "::group::Karma config overlay"
          cat tidyparse-web/karma.config.d/karma.conf.js || true
          echo "::endgroup::"

          echo "::group::Gradle/Karma log tail"
          tail -n 500 build/ci-logs/gradle-jsTest.log || true
          echo "::endgroup::"

          echo "::group::Watchdog log"
          cat build/ci-logs/watchdog.log || true
          echo "::endgroup::"

          echo "::group::Process and memory sampling"
          tail -n 1000 build/ci-logs/process-memory.log || true
          echo "::endgroup::"

          echo "::group::Browser and Chrome logs"
          cat build/ci-logs/browser-console.log || true
          cat build/ci-logs/chrome.log || true
          find build/ci-logs/chrome-crash-dumps -type f -print || true
          echo "::endgroup::"

          echo "::group::Process snapshot after failure"
          ps -axo pid,ppid,etime,stat,comm,args | grep -Ei 'java|gradle|kotlin|node|karma|chrome' | grep -v grep || true
          echo "::endgroup::"

          echo "::group::Test XML summaries and tails"
          while IFS= read -r file; do
            echo "===== ${file} ====="
            grep -nE '<testsuite|<testcase|<failure|<error|<system-err|</system-err>' "${file}" | head -200 || true
            echo "----- tail ${file} -----"
            tail -n 250 "${file}" || true
          done < <(find tidyparse-core tidyparse-web -path '*/build/test-results/*/TEST-*.xml' -type f | sort)
          echo "::endgroup::"

          echo "::group::Gradle problem reports"
          find . -path '*/build/reports/problems/*' -type f -print | sort
          echo "::endgroup::"
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            tidyparse-core/build/reports/tests/
            tidyparse-core/build/test-results/
            tidyparse-web/build/reports/tests/
            tidyparse-web/build/test-results/
            build/reports/problems/
            build/ci-logs/
